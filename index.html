<script>
    const CARRITO_STORAGE_KEY = 'triplem_carrito';

    function obtenerCarrito() {
        const carritoGuardado = localStorage.getItem(CARRITO_STORAGE_KEY);
        if (carritoGuardado) {
            return JSON.parse(carritoGuardado);
        }
        return { items: [] };
    }

    function guardarCarrito(carrito) {
        localStorage.setItem(CARRITO_STORAGE_KEY, JSON.stringify(carrito));
        console.log('Carrito guardado en localStorage:', carrito);
    }

    function crearTarjeta(producto) {
        return `
            <article class="group" data-id="${producto.id}" data-nombre="${producto.nombre}">
                <div class="relative aspect-[4/5] bg-surface-container-low overflow-hidden p-2 mb-6">
                    <img alt="${producto.nombre}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" src="${producto.imagen}"/>
                    <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                    </div>
                </div>
                <div class="quantity-selector">
                    <button class="quantity-btn" onclick="cambiarCantidad(${producto.id}, -1)">−</button>
                    <span class="quantity-value" id="cantidad-${producto.id}">1</span>
                    <button class="quantity-btn" onclick="cambiarCantidad(${producto.id}, 1)">+</button>
                </div>
                <div class="flex flex-col gap-2 mb-4">
                    <h3 class="font-headline text-xl font-bold tracking-tight text-on-surface">${producto.nombre}</h3>
                    <p class="text-primary font-semibold text-lg">${producto.precio}</p>
                    <p class="text-primary/80 font-semibold text-sm uppercase tracking-wide">${producto.familia}</p>
                </div>
                <button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold uppercase tracking-widest text-xs hover:brightness-110 active:scale-95 transition-all" onclick="agregarAlCarrito(${producto.id})">AGREGAR AL CARRITO</button>
            </article>
        `;
    }

    window.cambiarCantidad = function(id, delta) {
        const cantidadSpan = document.getElementById(`cantidad-${id}`);
        let cantidadActual = parseInt(cantidadSpan.textContent);
        let nuevaCantidad = cantidadActual + delta;
        
        if (nuevaCantidad < 1) {
            nuevaCantidad = 1;
        }
        if (nuevaCantidad > 99) {
            nuevaCantidad = 99;
        }
        
        cantidadSpan.textContent = nuevaCantidad;
        
        if (!window.cantidadesProductos) {
            window.cantidadesProductos = {};
        }
        window.cantidadesProductos[id] = nuevaCantidad;
    }

    window.agregarAlCarrito = function(id) {
        let cantidad = 1;
        if (window.cantidadesProductos && window.cantidadesProductos[id]) {
            cantidad = window.cantidadesProductos[id];
        } else {
            cantidad = parseInt(document.getElementById(`cantidad-${id}`).textContent);
        }
        
        const producto = window.todosLosProductos.find(p => p.id === id);
        
        if (producto) {
            const carrito = obtenerCarrito();
            const existingItem = carrito.items.find(item => item.id === id);
            
            if (existingItem) {
                existingItem.cantidad += cantidad;
            } else {
                carrito.items.push({
                    id: id,
                    nombre: producto.nombre,
                    precio: producto.precio,
                    imagen: producto.imagen,
                    familia: producto.familia,
                    cantidad: cantidad
                });
            }
            
            guardarCarrito(carrito);
            console.log(`✅ Agregado al carrito: ${producto.nombre} - Cantidad: ${cantidad} - Precio: ${producto.precio}`);
            alert(`✅ Agregado al carrito:\n${producto.nombre}\nCantidad: ${cantidad}\nPrecio unitario: ${producto.precio}\nFamilia: ${producto.familia}`);
            actualizarContadorCarrito();
        }
    }

    function actualizarContadorCarrito() {
        const carrito = obtenerCarrito();
        const totalItemsUnicos = carrito.items.length;
        const badge = document.getElementById('cartBadge');
        
        if (badge) {
            if (totalItemsUnicos > 0) {
                badge.textContent = totalItemsUnicos > 99 ? '99+' : totalItemsUnicos;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }
    }

    window.addEventListener('storage', (event) => {
        if (event.key === CARRITO_STORAGE_KEY) {
            actualizarContadorCarrito();
        }
    });

    async function cargarProductos() {
        try {
            const response = await fetch('json/productos.json');
            const data = await response.json();
            const productos = data.productos;
            const grid = document.getElementById('productsGrid');
            
            window.todosLosProductos = productos;
            
            window.cantidadesProductos = {};
            productos.forEach(p => {
                window.cantidadesProductos[p.id] = 1;
            });
            
            grid.innerHTML = productos.map(p => crearTarjeta(p)).join('');
            actualizarContadorCarrito();
        } catch (error) {
            console.error('Error cargando productos:', error);
            document.getElementById('productsGrid').innerHTML = '<p class="text-center col-span-3">Error cargando productos. Verifica que el archivo json/productos.json existe.</p>';
        }
    }

    function filtrarProductos(busqueda) {
        const busquedaLower = busqueda.toLowerCase().trim();
        const grid = document.getElementById('productsGrid');
        
        if (!window.todosLosProductos) return;
        
        const productosFiltrados = window.todosLosProductos.filter(producto => {
            return producto.nombre.toLowerCase().includes(busquedaLower) || 
                   producto.familia.toLowerCase().includes(busquedaLower);
        });
        
        if (productosFiltrados.length === 0) {
            grid.innerHTML = '<p class="text-center col-span-3 text-on-surface-variant">No se encontraron productos</p>';
        } else {
            productosFiltrados.forEach(p => {
                if (!window.cantidadesProductos[p.id]) {
                    window.cantidadesProductos[p.id] = 1;
                }
            });
            grid.innerHTML = productosFiltrados.map(p => crearTarjeta(p)).join('');
        }
    }

    cargarProductos();
    
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', (e) => {
        filtrarProductos(e.target.value);
    });
</script>
